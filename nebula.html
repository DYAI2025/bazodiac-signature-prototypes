<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazodiac Signature - Bioluminescent Neuro-Nebula</title>
    <style>
        body { margin: 0; background: #000005; color: #00f2ff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none; text-shadow: 0 0 15px rgba(0, 242, 255, 0.7); }
        #ui h1 { margin: 0; font-size: 1.8rem; letter-spacing: 4px; text-transform: uppercase; font-weight: 300; color: #00f2ff; }
        #ui p { opacity: 0.7; font-style: italic; margin-bottom: 20px; color: #bcdefd; }
        #controls { pointer-events: auto; background: rgba(10, 10, 30, 0.6); padding: 20px; border-radius: 15px; border: 1px solid rgba(0, 242, 255, 0.3); backdrop-filter: blur(10px); width: 250px; }
        .control-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        input { cursor: pointer; accent-color: #00f2ff; width: 100%; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Neuro-Nebula</h1>
        <p>Bioluminescent Resonance Field</p>
        <div id="controls">
            <div class="control-group">
                <label>Neural Pulse Speed</label>
                <input type="range" id="pulse" min="1" max="100" value="30">
            </div>
            <div class="control-group">
                <label>Nebula Density</label>
                <input type="range" id="density" min="1" max="100" value="60">
            </div>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000005);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 15, 35);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Neon Lighting
        const ambientLight = new THREE.AmbientLight(0x101040, 1);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0x00f2ff, 200, 100);
        pointLight.position.set(0, 20, 0);
        scene.add(pointLight);

        // GLOW TEXTURE (The "Bioluminescent" feel)
        const createGlowTexture = (color) => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, color);
            gradient.addColorStop(0.3, color.replace('1', '0.5'));
            gradient.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        };

        const cyanGlow = createGlowTexture('rgba(0, 242, 255, 1)');
        const magentaGlow = createGlowTexture('rgba(255, 0, 255, 1)');

        // 13 Identity Nodes
        const nodeCount = 13;
        const nodes = [];
        const nodeGroup = new THREE.Group();

        for (let i = 0; i < nodeCount; i++) {
            const angle = (i / nodeCount) * Math.PI * 2;
            const radius = 10 + Math.random() * 8;
            const pos = new THREE.Vector3(Math.cos(angle) * radius, (Math.random() - 0.5) * 15, Math.sin(angle) * radius);
            
            const nodeGeo = new THREE.SphereGeometry(0.4, 16, 16);
            const isMagenta = i % 2 === 0;
            const color = isMagenta ? new THREE.Color(0xff00ff) : new THREE.Color(0x00f2ff);
            
            const nodeMat = new THREE.MeshStandardMaterial({ 
                color: color, 
                emissive: color, 
                emissiveIntensity: 3 
            });
            const node = new THREE.Mesh(nodeGeo, nodeMat);
            node.position.copy(pos);
            nodeGroup.add(node);

            const aura = new THREE.Sprite(new THREE.SpriteMaterial({ 
                map: isMagenta ? magentaGlow : cyanGlow, 
                transparent: true, 
                opacity: 0.6, 
                blending: THREE.AdditiveBlending 
            }));
            aura.scale.set(6, 6, 1);
            node.add(aura);

            nodes.push({ mesh: node, originalPos: pos.clone(), phase: Math.random() * Math.PI * 2, color: color });
        }
        scene.add(nodeGroup);

        // Electric Filaments (Bioluminescent Threads)
        const lineMaterial = new THREE.LineBasicMaterial({ 
            color: 0x00f2ff, 
            transparent: true, 
            opacity: 0.2,
            blending: THREE.AdditiveBlending 
        });
        const lineGeometry = new THREE.BufferGeometry();
        const linePositions = new Float32Array(nodeCount * nodeCount * 3);
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        const filaments = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(filaments);

        // THE NEBULA CLOUD (The "Smoke" and "Glowing Gas")
        const cloudCount = 40;
        const cloudGroup = new THREE.Group();
        for(let i=0; i<cloudCount; i++) {
            const cloudGeo = new THREE.PlaneGeometry(15, 15);
            const cloudMat = new THREE.MeshBasicMaterial({
                map: Math.random() > 0.5 ? cyanGlow : magentaGlow,
                transparent: true,
                opacity: 0.1 + Math.random() * 0.2,
                depthWrite: false,
                blending: THREE.AdditiveBlending,
                side: THREE.DoubleSide
            });
            const cloud = new THREE.Mesh(cloudGeo, cloudMat);
            cloud.position.set((Math.random()-0.5)*50, (Math.random()-0.5)*30, (Math.random()-0.5)*50);
            cloud.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
            cloudGroup.add(cloud);
        }
        scene.add(cloudGroup);

        const pulseInput = document.getElementById('pulse');
        const densityInput = document.getElementById('density');

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const pulseSpeed = pulseInput.value / 100;
            const density = densityInput.value / 100;

            nodes.forEach((node, i) => {
                node.mesh.position.y = node.originalPos.y + Math.sin(time * 0.5 + node.phase) * 1.0;
                node.mesh.children[0].material.opacity = 0.4 + Math.sin(time * 2 + node.phase) * 0.3;
            });

            const posAttr = lineGeometry.attributes.position;
            let lineIdx = 0;
            for (let i = 0; i < nodeCount; i++) {
                for (let j = i + 1; j < nodeCount; j++) {
                    const dist = nodes[i].mesh.position.distanceTo(nodes[j].mesh.position);
                    if (dist < 25 * density) {
                        posAttr.setXYZ(lineIdx++, nodes[i].mesh.position.x, nodes[i].mesh.position.y, nodes[i].mesh.position.z);
                        posAttr.setXYZ(lineIdx++, nodes[j].mesh.position.x, nodes[j].mesh.position.y, nodes[j].mesh.position.z);
                    } else {
                        posAttr.setXYZ(lineIdx++, 0, 0, 0);
                        posAttr.setXYZ(lineIdx++, 0, 0, 0);
                    }
                }
            }
            posAttr.needsUpdate = true;
            cloudGroup.rotation.y += 0.0005;
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
