<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazodiac Signature - Living Neuro-Nebula</title>
    <style>
        body { margin: 0; background: #000003; color: #00f2ff; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }
        #ui { position: absolute; top: 30px; left: 30px; z-index: 10; pointer-events: none; }
        #ui h1 { margin: 0; font-size: 1.6rem; letter-spacing: 6px; text-transform: uppercase; font-weight: 200; color: #00f2ff; text-shadow: 0 0 20px rgba(0,242,255,0.5); }
        #ui p { opacity: 0.6; font-style: italic; margin-bottom: 20px; font-size: 0.9rem; }
        #controls { pointer-events: auto; background: rgba(0, 0, 10, 0.4); padding: 25px; border-radius: 20px; border: 1px solid rgba(0, 242, 255, 0.2); backdrop-filter: blur(15px); width: 280px; }
        .control-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
        input { cursor: pointer; accent-color: #00f2ff; width: 100%; height: 4px; border-radius: 2px; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>Neuro-Nebula</h1>
        <p>A Living Bioluminescent Entity</p>
        <div id="controls">
            <div class="control-group">
                <label>Vitality (Pulse Speed)</label>
                <input type="range" id="pulse" min="1" max="100" value="30">
            </div>
            <div class="control-group">
                <label>Cosmic Density (Fog)</label>
                <input type="range" id="density" min="1" max="100" value="70">
            </div>
        </div>
    </div>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000005);
        scene.fog = new THREE.FogExp2(0x000005, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        // Enable bloom-like effect by using additive blending and high emissives
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.5;

        const ambientLight = new THREE.AmbientLight(0x101040, 0.5);
        scene.add(ambientLight);

        // --- THE NEBULA CLOUD (Volumetric Simulation) ---
        // Instead of points, we use overlapping large, soft, rotating planes with noise-like textures
        const createCloudLayer = (color, count) => {
            const group = new THREE.Group();
            const textureLoader = new THREE.TextureLoader();
            // Using a radial gradient canvas for a soft cloud feel
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(64,64,0, 64,64,64);
            grad.addColorStop(0, color);
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0,0,128,128);
            const tex = new THREE.CanvasTexture(canvas);

            for(let i=0; i<count; i++) {
                const mat = new THREE.MeshBasicMaterial({ 
                    map: tex, 
                    transparent: true, 
                    opacity: 0.1 + Math.random() * 0.15, 
                    depthWrite: false, 
                    blending: THREE.AdditiveBlending 
                });
                const geo = new THREE.PlaneGeometry(40, 40);
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set((Math.random()-0.5)*60, (Math.random()-0.5)*40, (Math.random()-0.5)*60);
                mesh.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                group.add(mesh);
            }
            return group;
        };

        const cyanClouds = createCloudLayer('rgba(0, 242, 255, 0.8)');
        const magentaClouds = createCloudLayer('rgba(255, 0, 255, 0.6)');
        scene.add(cyanClouds);
        scene.add(magentaClouds);

        // --- THE NEURAL CORE (Bioluminescent Nodes) ---
        const nodeCount = 13;
        const nodes = [];
        const nodeGroup = new THREE.Group();

        for (let i = 0; i < nodeCount; i++) {
            const angle = (i / nodeCount) * Math.PI * 2;
            const radius = 8 + Math.random() * 8;
            const pos = new THREE.Vector3(Math.cos(angle)*radius, (Math.random()-0.5)*15, Math.sin(angle)*radius);
            
            const nodeGeo = new THREE.SphereGeometry(0.3, 16, 16);
            const isMagenta = i % 2 === 0;
            const color = isMagenta ? new THREE.Color(0xff00ff) : new THREE.Color(0x00f2ff);
            const nodeMat = new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 5 });
            const node = new THREE.Mesh(nodeGeo, nodeMat);
            node.position.copy(pos);
            nodeGroup.add(node);

            // Soft Outer Glow
            const glowGeo = new THREE.SphereGeometry(1.2, 16, 16);
            const glowMat = new THREE.MeshBasicMaterial({ 
                color: color, 
                transparent: true, 
                opacity: 0.15, 
                blending: THREE.AdditiveBlending 
            });
            const glow = new THREE.Mesh(glowGeo, glowMat);
            node.add(glow);

            nodes.push({ mesh: node, originalPos: pos.clone(), phase: Math.random()*Math.PI*2 });
        }
        scene.add(nodeGroup);

        // --- ELECTRIC FILAMENTS (Neural tendrils) ---
        const lineMaterial = new THREE.LineBasicMaterial({ 
            color: 0x00f2ff, transparent: true, opacity: 0.15, blending: THREE.AdditiveBlending 
        });
        const lineGeometry = new THREE.BufferGeometry();
        const linePositions = new Float32Array(nodeCount * nodeCount * 3);
        lineGeometry.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
        const filaments = new THREE.LineSegments(lineGeometry, lineMaterial);
        scene.add(filaments);

        const pulseInput = document.getElementById('pulse');
        const densityInput = document.getElementById('density');

        function animate() {
            requestAnimationFrame(animate);
            const time = Date.now() * 0.001;
            const pulse = pulseInput.value / 100;
            const density = densityInput.value / 100;

            // Living movement of nodes
            nodes.forEach((node, i) => {
                node.mesh.position.x = node.originalPos.x + Math.sin(time * 0.3 + node.phase) * 1.5;
                node.mesh.position.y = node.originalPos.y + Math.cos(time * 0.5 + node.phase) * 1.5;
                node.mesh.position.z = node.originalPos.z + Math.sin(time * 0.2 + node.phase) * 1.5;
                node.mesh.children[0].material.opacity = 0.1 + Math.sin(time * 2 + node.phase) * 0.1;
            });

            // Dynamic filaments
            const posAttr = lineGeometry.attributes.position;
            let lineIdx = 0;
            for (let i = 0; i < nodeCount; i++) {
                for (let j = i + 1; j < nodeCount; j++) {
                    const dist = nodes[i].mesh.position.distanceTo(nodes[j].mesh.position);
                    if (dist < 20 * density) {
                        posAttr.setXYZ(lineIdx++, nodes[i].mesh.position.x, nodes[i].mesh.position.y, nodes[i].mesh.position.z);
                        posAttr.setXYZ(lineIdx++, nodes[j].mesh.position.x, nodes[j].mesh.position.y, nodes[j].mesh.position.z);
                    } else {
                        posAttr.setXYZ(lineIdx++, 0, 0, 0);
                        posAttr.setXYZ(lineIdx++, 0, 0, 0);
                    }
                }
            }
            posAttr.needsUpdate = true;

            // Rotate the clouds for a shifting nebula feel
            cyanClouds.rotation.y += 0.0003;
            magentaClouds.rotation.y -= 0.0002;
            cyanClouds.rotation.z += 0.0001;

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
