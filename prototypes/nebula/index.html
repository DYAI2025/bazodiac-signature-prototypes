<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazodiac Nebula — Bioluminescent Network</title>
    <style>
        body { margin: 0; background: #050505; color: #e0e0e0; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; font-family: 'Cormorant Garamond', serif; }
        .title { font-size: 24px; color: #d4af37; letter-spacing: 2px; }
        .metrics { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #888; }
        #controls { position: absolute; bottom: 20px; right: 20px; background: rgba(26, 26, 26, 0.8); padding: 15px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px); display: flex; flex-direction: column; gap: 10px; z-index: 10; }
        .ctrl-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
        label { font-size: 12px; color: #aaa; text-transform: uppercase; }
        input { cursor: pointer; accent-color: #d4af37; }
        /* Inside the unified shell the shell HUD already shows title + metrics */
        html.embedded #hud { display: none; }
    </style>
    <script>if (window.self !== window.top) document.documentElement.classList.add('embedded');</script>
</head>
<body>
    <div id="hud">
        <div class="title">Bioluminescent Neuro-Nebula</div>
        <div class="metrics" id="metrics">Mapping Neural Filaments...</div>
    </div>
    <div id="controls">
        <div class="ctrl-row"><label>Coherence</label><input type="range" id="harmony" min="0" max="100" value="80"></div>
        <div class="ctrl-row"><label>Instability</label><input type="range" id="friction" min="0" max="100" value="20"></div>
        <div class="ctrl-row"><label>Pulse Rate</label><input type="range" id="cosmic" min="0" max="100" value="40"></div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
