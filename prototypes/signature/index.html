<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bazodiac Signatur — Kymatische Fusion</title>
    <style>
        body { margin: 0; background: #050505; color: #e0e0e0; overflow: hidden; font-family: 'Inter', sans-serif; }
        canvas { display: block; }
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; font-family: 'Cormorant Garamond', serif; }
        .title { font-size: 24px; color: #d4af37; letter-spacing: 2px; }
        .metrics { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #888; max-width: 60vw; }
        #controls { position: absolute; bottom: 20px; right: 20px; background: rgba(26, 26, 26, 0.85); padding: 15px; border-radius: 12px; border: 1px solid rgba(212, 175, 55, 0.2); backdrop-filter: blur(10px); display: flex; flex-direction: column; gap: 10px; z-index: 10; min-width: 260px; }
        .ctrl-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        input[type="range"] { cursor: pointer; accent-color: #d4af37; flex: 1; min-width: 90px; }
        .src { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #d4af37; letter-spacing: 0.5px; white-space: nowrap; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
        .btn-row { justify-content: flex-start; gap: 8px; }
        button { background: rgba(212, 175, 55, 0.08); color: #d4af37; border: 1px solid rgba(212, 175, 55, 0.4); border-radius: 6px; padding: 5px 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; font-family: 'Inter', sans-serif; }
        button:hover { background: rgba(212, 175, 55, 0.2); }
        button.active { background: rgba(212, 175, 55, 0.35); color: #050505; font-weight: 600; }
        #matchPanel { border-top: 1px solid rgba(212, 175, 55, 0.25); padding-top: 10px; display: flex; flex-direction: column; gap: 6px; }
        #matchPanel[hidden] { display: none; }
        .mp-title { font-size: 12px; color: #d4af37; text-transform: uppercase; letter-spacing: 1px; }
        .mp-title span { font-family: 'JetBrains Mono', monospace; color: #e0e0e0; }
        .bar-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
        .bar-sym { width: 16px; text-align: center; }
        .bar-track { flex: 1; height: 5px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
        .bar-val { font-family: 'JetBrains Mono', monospace; font-size: 9px; color: #888; width: 34px; text-align: right; }
        .mp-narrative { font-size: 11px; color: #999; line-height: 1.4; max-width: 260px; }
        /* Inside the unified shell the shell HUD already shows title + metrics */
        html.embedded #hud { display: none; }
    </style>
    <script>if (window.self !== window.top) document.documentElement.classList.add('embedded');</script>
</head>
<body>
    <div id="hud">
        <div class="title">Bazodiac Signatur</div>
        <div class="metrics" id="metrics">Lade Signatur…</div>
    </div>
    <div id="controls">
        <div class="ctrl-row">
            <label for="cosmic">Cosmic Weather</label>
            <input type="range" id="cosmic" min="0" max="100" value="50">
            <span class="src" id="cosmicSource">STATISCH</span>
        </div>
        <div class="ctrl-row">
            <label for="timelapse">Zeitraffer</label>
            <input type="range" id="timelapse" min="0" max="100" value="0">
        </div>
        <div class="ctrl-row btn-row">
            <button id="matchBtn">Match-Modus</button>
            <button id="liveBtn">Live</button>
        </div>
        <div id="matchPanel" hidden>
            <div class="mp-title">Kohärenz <span id="coherenceValue">–</span></div>
            <div id="resonanceBars"></div>
            <div class="mp-narrative" id="matchNarrative"></div>
        </div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
